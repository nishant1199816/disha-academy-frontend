<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 84 84">
  <!-- Gold outer ring -->
  <circle cx="42" cy="42" r="41" fill="#c9a227"/>
  <!-- White gap -->
  <circle cx="42" cy="42" r="38.5" fill="#ffffff"/>
  <!-- Navy fill -->
  <circle cx="42" cy="42" r="37" fill="#1e3a8a"/>
  <!-- Inner gold ring -->
  <circle cx="42" cy="42" r="30" fill="none" stroke="#f5c842" stroke-width="1"/>
  <!-- Compass spokes -->
  <line x1="42" y1="13" x2="42" y2="71" stroke="#f5c842" stroke-width="0.7" opacity="0.25"/>
  <line x1="13" y1="42" x2="71" y2="42" stroke="#f5c842" stroke-width="0.7" opacity="0.25"/>
  <!-- Open Book left page -->
  <path d="M 23,58 L 23,48 Q 23,45 27,44 L 41,42 L 41,62 Q 33,60 27,62 Q 23,62 23,59 Z" fill="#f5c842"/>
  <!-- Open Book right page -->
  <path d="M 43,42 L 57,44 Q 61,45 61,48 L 61,59 Q 61,62 57,62 Q 51,60 43,62 Z" fill="#f5c842" opacity="0.65"/>
  <!-- Book spine -->
  <line x1="42" y1="42" x2="42" y2="62" stroke="#1e3a8a" stroke-width="2.2"/>
  <!-- Page lines -->
  <line x1="27" y1="50" x2="40" y2="48" stroke="#1e3a8a" stroke-width="1" opacity="0.4"/>
  <line x1="27" y1="53" x2="40" y2="51" stroke="#1e3a8a" stroke-width="1" opacity="0.4"/>
  <line x1="27" y1="56" x2="40" y2="54" stroke="#1e3a8a" stroke-width="1" opacity="0.4"/>
  <!-- Compass needle north - gold -->
  <polygon points="42,15 45.5,33 42,30 38.5,33" fill="#f5c842"/>
  <!-- Compass needle south - white -->
  <polygon points="42,52 38.5,34 42,37 45.5,34" fill="#ffffff" opacity="0.45"/>
  <!-- Center pivot -->
  <circle cx="42" cy="33" r="3" fill="#ffffff" stroke="#f5c842" stroke-width="1.3"/>
</svg>